
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISA Esport Tournament Bracket</title>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter & Kanit (Thai support) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --isa-green: #22c55e;
            --isa-dark: #166534;
            --bg-grid: #f8fafc;
        }

        body {
            font-family: 'Kanit', 'Inter', sans-serif;
            background-color: var(--bg-grid);
            background-image: 
                linear-gradient(#e2e8f0 1px, transparent 1px),
                linear-gradient(90deg, #e2e8f0 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .match-card {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            width: 240px;
            transition: all 0.3s ease;
        }

        .team-row {
            padding: 12px 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            border-bottom: 1px solid #f1f5f9;
        }

        .team-row:last-child { border-bottom: none; }

        .team-row:hover:not(.winner):not(.empty) {
            background-color: #f0fdf4;
        }

        .team-row.winner {
            background-color: var(--isa-green);
            color: white;
            font-weight: bold;
        }

        .team-row.loser {
            opacity: 0.5;
            background-color: #f8fafc;
        }

        .team-row.empty {
            cursor: default;
            color: #94a3b8;
            font-style: italic;
        }

        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [teams, setTeams] = useState(["Team A", "Team B", "Team C", "Team D"]);
            const [inputValue, setInputValue] = useState("");
            const [bracket, setBracket] = useState(null);
            const [mode, setMode] = useState('input');

            const addTeam = () => {
                if (inputValue.trim()) {
                    setTeams([...teams, inputValue.trim()]);
                    setInputValue("");
                }
            };

            const generateBracket = () => {
                if (teams.length < 2) return;
                
                const shuffled = [...teams].sort(() => Math.random() - 0.5);
                const n = shuffled.length;
                const nextPowerOfTwo = Math.pow(2, Math.ceil(Math.log2(n)));
                const spots = new Array(nextPowerOfTwo).fill(null);
                for (let i = 0; i < n; i++) spots[i] = shuffled[i];

                const rounds = [];
                const r1Matches = [];
                for (let i = 0; i < nextPowerOfTwo; i += 2) {
                    const t1 = spots[i];
                    const t2 = spots[i+1];
                    let winner = null;
                    if (t1 && !t2) winner = t1;
                    if (!t1 && t2) winner = t2;
                    r1Matches.push({ id: `r0-m${i/2}`, team1: t1, team2: t2, winner });
                }
                rounds.push(r1Matches);

                let matchCount = nextPowerOfTwo / 4;
                let rIdx = 1;
                while (matchCount >= 1) {
                    const round = [];
                    for (let i = 0; i < matchCount; i++) {
                        round.push({ id: `r${rIdx}-m${i}`, team1: null, team2: null, winner: null });
                    }
                    rounds.push(round);
                    matchCount /= 2;
                    rIdx++;
                }

                propagate(rounds);
                setBracket(rounds);
                setMode('bracket');
            };

            const propagate = (currentBracket) => {
                for (let r = 0; r < currentBracket.length - 1; r++) {
                    const currentRound = currentBracket[r];
                    const nextRound = currentBracket[r+1];
                    currentRound.forEach((match, mIdx) => {
                        if (match.winner) {
                            const nextMIdx = Math.floor(mIdx / 2);
                            const isSlot1 = mIdx % 2 === 0;
                            if (isSlot1) nextRound[nextMIdx].team1 = match.winner;
                            else nextRound[nextMIdx].team2 = match.winner;
                        }
                    });
                }
            };

            const selectWinner = (rIdx, mIdx, winner) => {
                if (!winner || !bracket) return;
                const newBracket = JSON.parse(JSON.stringify(bracket));
                const match = newBracket[rIdx][mIdx];
                match.winner = winner;

                let currentR = rIdx + 1;
                let currentM = Math.floor(mIdx / 2);
                let isSlot1 = mIdx % 2 === 0;
                let valToProp = winner;

                while (currentR < newBracket.length) {
                    const targetMatch = newBracket[currentR][currentM];
                    const oldVal = isSlot1 ? targetMatch.team1 : targetMatch.team2;
                    if (isSlot1) targetMatch.team1 = valToProp;
                    else targetMatch.team2 = valToProp;
                    if (oldVal !== valToProp) targetMatch.winner = null;
                    const prevM = currentM;
                    currentM = Math.floor(currentM / 2);
                    isSlot1 = prevM % 2 === 0;
                    currentR++;
                }
                setBracket(newBracket);
            };

            return (
                <div className="min-h-screen p-6 md:p-12 flex flex-col items-center">
                    <div className="text-center mb-12 animate-pop">
                        <h1 className="text-6xl font-black text-slate-900 tracking-tight mb-2">
                            ISA <span className="text-green-500">ESPORT</span>
                        </h1>
                        <p className="text-slate-500 font-bold uppercase tracking-[0.2em] text-sm">
                            Islamsriayuttha Foundation School
                        </p>
                    </div>

                    {mode === 'input' ? (
                        <div className="w-full max-w-2xl glass rounded-[2rem] p-10 shadow-2xl animate-pop">
                            <h2 className="text-2xl font-bold mb-8 flex items-center gap-3">
                                <span className="w-2 h-8 bg-green-500 rounded-full"></span>
                                รายชื่อทีมเข้าร่วม
                            </h2>
                            <div className="flex gap-3 mb-10">
                                <input 
                                    type="text" 
                                    className="flex-1 bg-slate-50 border-2 border-slate-200 rounded-2xl px-5 py-4 font-bold focus:border-green-500 outline-none transition-all text-lg"
                                    placeholder="ระบุชื่อทีม..."
                                    value={inputValue}
                                    onChange={(e) => setInputValue(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && addTeam()}
                                />
                                <button onClick={addTeam} className="bg-green-500 hover:bg-green-600 text-white font-black px-8 rounded-2xl shadow-lg transition-all active:scale-95">
                                    เพิ่ม
                                </button>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-10 max-h-80 overflow-y-auto pr-2">
                                {teams.map((t, i) => (
                                    <div key={i} className="bg-white border-2 border-slate-100 p-4 rounded-2xl flex justify-between items-center group shadow-sm">
                                        <span className="font-bold text-slate-700">{i+1}. {t}</span>
                                        <button onClick={() => setTeams(teams.filter((_, idx) => idx !== i))} className="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                                        </button>
                                    </div>
                                ))}
                            </div>
                            <button 
                                onClick={generateBracket}
                                disabled={teams.length < 2}
                                className="w-full bg-slate-900 text-white font-black py-5 rounded-3xl text-2xl shadow-xl hover:bg-black transition-all disabled:opacity-20"
                            >
                                สุ่มตารางการแข่งขัน
                            </button>
                        </div>
                    ) : (
                        <div className="w-full animate-pop overflow-x-auto pb-20">
                            <div className="flex justify-between items-center mb-16 px-10">
                                <button onClick={() => setMode('input')} className="bg-white border-2 border-slate-200 px-6 py-2 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-50">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                                    กลับไปหน้าแรก
                                </button>
                                <div className="bg-green-100 text-green-700 px-6 py-2 rounded-full text-xs font-black uppercase tracking-widest border border-green-200">
                                    Click ที่ชื่อทีมเพื่อเลือกผู้ชนะ
                                </div>
                            </div>
                            <div className="flex gap-20 px-10 items-center min-w-max">
                                {bracket.map((round, rIdx) => (
                                    <div key={rIdx} className="flex flex-col justify-around gap-12">
                                        <div className="text-center mb-4">
                                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">
                                                {rIdx === bracket.length - 1 ? 'Final' : `Round ${rIdx + 1}`}
                                            </span>
                                        </div>
                                        {round.map((match, mIdx) => (
                                            <div key={match.id} className="match-card">
                                                <div 
                                                    className={`team-row ${match.winner === match.team1 && match.team1 ? 'winner' : ''} ${match.winner && match.winner !== match.team1 ? 'loser' : ''} ${!match.team1 ? 'empty' : ''}`}
                                                    onClick={() => selectWinner(rIdx, mIdx, match.team1)}
                                                >
                                                    <span className="truncate pr-2">{match.team1 || 'TBD'}</span>
                               <artifact identifier="isa-esport-bracket-final" type="text/html" title="ISA Esport Tournament Bracket">
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISA Esport Tournament Bracket</title>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Kanit -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --isa-green: #22c55e; }
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        .match-card { background: white; border: 2px solid #e2e8f0; border-radius: 12px; width: 220px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow: hidden; }
        .team-row { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; transition: 0.2s; min-height: 48px; align-items: center; }
        .team-row:last-child { border-bottom: none; }
        .winner { background-color: var(--isa-green); color: white; font-weight: bold; }
        .loser { opacity: 0.5; background-color: #f8fafc; }
        .empty { color: #94a3b8; font-style: italic; cursor: default; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [teams, setTeams] = useState(["ทีมอาสากู้ภัย", "มังกรทอง FC", "สิงห์คะนองนา", "อินทรีเหล็ก Esports", "หงส์แดง มหาอุด"]);
            const [input, setInput] = useState("");
            const [bracket, setBracket] = useState(null);
            const [mode, setMode] = useState('input');

            const start = () => {
                if (teams.length < 2) return;
                const shuffled = [...teams].sort(() => Math.random() - 0.5);
                const size = Math.pow(2, Math.ceil(Math.log2(shuffled.length)));
                const slots = new Array(size).fill(null);
                shuffled.forEach((t, i) => slots[i] = t);

                let rounds = [];
                let r1 = [];
                for (let i = 0; i < size; i += 2) {
                    let t1 = slots[i], t2 = slots[i+1];
                    let win = (t1 && !t2) ? t1 : (t2 && !t1) ? t2 : null;
                    r1.push({ t1, t2, win });
                }
                rounds.push(r1);

                let nextCount = size / 4;
                while (nextCount >= 1) {
                    let rd = [];
                    for (let i = 0; i < nextCount; i++) rd.push({ t1: null, t2: null, win: null });
                    rounds.push(rd);
                    nextCount /= 2;
                }

                for (let r = 0; r < rounds.length - 1; r++) {
                    rounds[r].forEach((m, i) => {
                        if (m.win) {
                            let next = rounds[r+1][Math.floor(i/2)];
                            if (i % 2 === 0) next.t1 = m.win; else next.t2 = m.win;
                        }
                    });
                }
                setBracket(rounds);
                setMode('bracket');
            };

            const pick = (rIdx, mIdx, team) => {
                if (!team || !bracket) return;
                const newB = JSON.parse(JSON.stringify(bracket));
                newB[rIdx][mIdx].win = team;
                let r = rIdx + 1, m = Math.floor(mIdx/2), isT1 = (mIdx % 2 === 0), val = team;
                while (r < newB.length) {
                    let target = newB[r][m];
                    let old = isT1 ? target.t1 : target.t2;
                    if (isT1) target.t1 = val; else target.t2 = val;
                    if (old !== val) target.win = null;
                    isT1 = (m % 2 === 0); m = Math.floor(m/2); r++;
                }
                setBracket(newB);
            };

            return (
                <div className="min-h-screen p-8 flex flex-col items-center">
                    <header className="text-center mb-12">
                        <h1 className="text-6xl font-black mb-2 tracking-tight">ISA <span className="text-green-500 underline decoration-8 underline-offset-8">ESPORT</span></h1>
                        <p className="text-slate-400 font-bold uppercase tracking-[0.3em] text-xs">Islamsriayuttha Foundation School</p>
                    </header>

                    {mode === 'input' ? (
                        <div className="w-full max-w-lg glass p-10 rounded-[2.5rem] shadow-2xl">
                            <h2 className="text-2xl font-bold mb-6 flex items-center gap-3">
                                <span className="w-2 h-8 bg-green-500 rounded-full"></span>
                                รายชื่อทีมแข่ง
                            </h2>
                            <div className="flex gap-3 mb-10">
                                <input className="flex-1 border-2 border-slate-200 p-4 rounded-2xl font-bold focus:border-green-500 outline-none text-lg" value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && setTeams([...teams, input.trim()]) || setInput("")} placeholder="ชื่อทีม..." />
                                <button className="bg-green-500 text-white px-10 rounded-2xl font-black shadow-lg" onClick={() => { if(input.trim()) { setTeams([...teams, input.trim()]); setInput(""); } }}>เพิ่ม</button>
                            </div>
                            <div className="grid grid-cols-1 gap-2 mb-10 max-h-60 overflow-y-auto pr-2">
                                {teams.map((t, i) => (
                                    <div key={i} className="bg-white border p-4 rounded-xl flex justify-between shadow-sm">
                                        <span className="font-bold">{i+1}. {t}</span>
                                        <button className="text-slate-300 hover:text-red-500" onClick={() => setTeams(teams.filter((_, idx) => idx !== i))}>ลบ</button>
                                    </div>
                                ))}
                            </div>
                            <button className="w-full bg-slate-900 text-white py-6 rounded-3xl font-black text-2xl hover:bg-black transition-all shadow-xl" onClick={start} disabled={teams.length < 2}>สร้างตารางแข่งขัน</button>
                        </div>
                    ) : (
                        <div className="w-full">
                            <div className="flex justify-between items-center mb-12 max-w-6xl mx-auto">
                                <button className="bg-white border-2 border-slate-200 px-8 py-3 rounded-2xl font-bold" onClick={() => setMode('input')}>กลับไปแก้ไขทีม</button>
                                <div className="bg-green-100 text-green-700 px-6 py-3 rounded-full text-xs font-black uppercase border border-green-200">คลิกชื่อทีมเพื่อเลือกผู้ชนะ</div>
                            </div>
                            <div className="flex gap-16 overflow-x-auto pb-20 justify-center items-center min-w-max">
                                {bracket.map((round, rIdx) => (
                                    <div key={rIdx} className="flex flex-col justify-around gap-12 h-full">
                                        <div className="text-center text-[10px] font-black text-slate-400 uppercase tracking-widest">{rIdx === bracket.length - 1 ? 'ชิงชนะเลิศ' : `รอบที่ ${rIdx + 1}`}</div>
                                        {round.map((m, mIdx) => (
                                            <div key={mIdx} className="match-card">
                                                <div className={`team-row ${m.win === m.t1 && m.t1 ? 'winner' : m.win ? 'loser' : ''} ${!m.t1 ? 'empty' : ''}`} onClick={() => pick(rIdx, mIdx, m.t1)}>
                                                    <span className="truncate">{m.t1 || 'WAITING...'}</span>
                                                </div>
                                                <div className={`team-row ${m.win === m.t2 && m.t2 ? 'winner' : m.win ? 'loser' : ''} ${!m.t2 ? 'empty' : ''}`} onClick={() => pick(rIdx, mIdx, m.t2)}>
                                                    <span className="truncate">{m.t2 || 'WAITING...'}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
