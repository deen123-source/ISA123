                    r++;

                if (rIdx === newB.length - 1) setChampion(team);
                setBracket(newB);
            };

                            const midX = x1 + (x2 - x1) / 2;

                                active: bracket[r][m].win !== null
                            });
                        }
                    }
                }

                    ) : (

                                    <div className="flex flex-col gap-1"><span>ขนาด: {size.w}px</span><input type="range" min="150" max="350" value={size.w} onChange={e => setSize({...size, w: parseInt(e.target.value)})} /></div>
                                    <div className="flex flex-col gap-1"><span>ห่าง: {size.g}px</span><input type="range" min="10" max="150" value={size.g} onChange={e => setSize({...size, g: parseInt(e.target.value)})} /></div>
                                    <div className="flex flex-col gap-1"><span>ฟอนต์: {size.f}px</span><input type="range" min="10" max="24" value={size.f} onChange={e => setSize({...size, f: parseInt(e.target.value)})} /></div>

                                <button className="font-bold text-green-500" onClick={() => window.print()}>พิมพ์ PDF</button>

                            <div className="relative w-full overflow-x-auto pb-48">
                                <div ref={contRef} className="relative flex gap-24 items-center justify-center min-w-max px-20">

                                    {bracket.map((round, rIdx) => (
                                        <div key={rIdx} className="flex flex-col justify-around py-10" style={{ gap: `${size.g}px`, minHeight: '800px' }}>
                                            <h4 className="text-center text-[11px] font-black text-slate-300 uppercase tracking-[0.3em] mb-4">{rIdx === bracket.length-1 ? 'Final' : `Round ${rIdx+1}`}</h4>
                                            {round.map((m, mIdx) => (
                                                <div key={m.id} id={`m-${rIdx}-${mIdx}`} className="match-card" style={{ width: `${size.w}px`, fontSize: `${size.f}px` }}>
                                                    <div className={`team-slot ${m.win?.id === m.t1?.id && m.t1 ? 'winner' : m.win ? 'loser' : ''}`}
